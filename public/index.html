<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monopoly Deal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a472a 0%,#2d5a3d 100%);min-height:100vh;color:#fff}
.screen{display:none;padding:20px;min-height:100vh}
.screen.active{display:block}
.center{text-align:center}
h1{font-size:2em;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
input{padding:12px;font-size:16px;border:none;border-radius:8px;margin:8px 0;width:100%;max-width:280px}
button{padding:12px 24px;font-size:16px;border:none;border-radius:8px;cursor:pointer;margin:8px;background:#4CAF50;color:white;font-weight:bold}
button:hover{background:#45a049}
button:disabled{background:#666;cursor:not-allowed}
button.secondary{background:#2196F3}
button.danger{background:#f44336}
.room-code{font-size:2.5em;font-weight:bold;letter-spacing:8px;background:rgba(0,0,0,0.3);padding:15px 30px;border-radius:10px;margin:15px 0;display:inline-block}
.players-list{background:rgba(0,0,0,0.2);padding:15px;border-radius:10px;margin:15px auto;max-width:350px}
.player-item{padding:8px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between}
.player-item.ready{color:#4CAF50}
.player-item.ready::after{content:" ✓"}
.player-item.host::before{content:"👑 "}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.turn-info{font-size:1.1em;font-weight:bold}
.plays-left{color:#ffd700}
.opponents{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.opponent{background:rgba(0,0,0,0.3);padding:8px;border-radius:8px;min-width:140px;flex:1}
.opponent.current{border:2px solid #ffd700}
.opponent h4{margin-bottom:4px;font-size:14px}
.opponent-info{font-size:12px}
.opponent-props{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.prop-badge{width:22px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;color:#fff;text-shadow:1px 1px 1px #000}
.prop-badge.complete{box-shadow:0 0 4px gold}
.game-center{display:flex;justify-content:center;align-items:center;gap:15px;margin:10px 0;flex-wrap:wrap}
.deck-display{background:rgba(0,0,0,0.5);padding:15px;border-radius:10px;text-align:center}
.deck-count{font-size:1.8em;font-weight:bold}
.last-played{text-align:center}
.last-played-card{width:70px;height:100px;border-radius:6px;background-size:cover;background-position:center;margin:0 auto;background-color:#333}
.my-area{background:rgba(0,0,0,0.2);padding:12px;border-radius:10px;margin-top:8px}
.my-area h3{margin-bottom:8px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.2);padding-bottom:4px}
.cards-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.card{width:60px;height:85px;border-radius:5px;background:#fff;cursor:pointer;background-size:cover;background-position:center;transition:transform 0.2s;flex-shrink:0}
.card:hover{transform:translateY(-4px)}
.card.selected{box-shadow:0 0 12px #ffd700;transform:translateY(-8px)}
.props-display{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.prop-set{background:rgba(255,255,255,0.1);padding:6px;border-radius:5px;text-align:center}
.prop-set-header{padding:4px 8px;border-radius:3px;font-weight:bold;font-size:11px;margin-bottom:4px}
.prop-set.complete .prop-set-header{box-shadow:0 0 6px gold}
.prop-cards{display:flex;gap:2px;justify-content:center}
.prop-card{width:45px;height:63px;border-radius:3px;background-size:cover;background-position:center;background-color:#ccc;cursor:pointer}
#actionPanel{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);padding:15px;border-radius:15px 15px 0 0;max-height:70vh;overflow-y:auto;display:none;z-index:100}
#actionPanel.active{display:block}
#actionPanel h3{margin-bottom:12px}
.color-select,.player-select{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.color-btn,.player-btn{padding:10px 14px;border-radius:6px;cursor:pointer;font-weight:bold;color:#fff;text-shadow:1px 1px 2px #000;border:3px solid transparent}
.color-btn.selected,.player-btn.selected{border-color:#ffd700;box-shadow:0 0 8px #ffd700}
.player-btn{background:#4a4a6a}
#showActionsBtn{position:fixed;bottom:15px;left:15px;z-index:99;display:none;padding:10px 15px}
.pending-banner{background:#c0392b;padding:12px;border-radius:8px;margin:8px 0;text-align:center;font-weight:bold}
.payment-cards{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.pay-card{padding:8px 12px;background:#228b22;color:#fff;border-radius:5px;cursor:pointer;font-weight:bold;border:3px solid transparent}
.pay-card.selected{border-color:#ffd700;box-shadow:0 0 8px #ffd700}
.action-log{position:fixed;bottom:70px;left:8px;background:rgba(0,0,0,0.7);padding:8px;border-radius:6px;font-size:10px;max-width:180px;max-height:120px;overflow-y:auto}
.action-log div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
#endTurnBtn{position:fixed;bottom:15px;right:15px;z-index:99}
.winner-banner{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;padding:30px;border-radius:15px;text-align:center;margin:40px auto;max-width:350px}
.winner-banner h1{color:#000;text-shadow:none}
#overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:200;padding:20px}
@media(max-width:500px){.card{width:50px;height:70px}.prop-card{width:38px;height:53px}.action-log{display:none}}
</style>
</head>
<body>
<div id="homeScreen" class="screen active center">
<h1>🎴 Monopoly Deal</h1>
<p style="margin-bottom:20px">The fast-dealing property trading game!</p>
<input type="text" id="playerName" placeholder="Your Name" maxlength="12">
<br><button onclick="createGame()">Create Game</button>
<br><br>
<input type="text" id="roomCodeInput" placeholder="Room Code" maxlength="4" style="text-transform:uppercase">
<br><button class="secondary" onclick="joinGame()">Join Game</button>
<p id="homeError" style="color:#ff6b6b;margin-top:15px"></p>
</div>

<div id="lobbyScreen" class="screen center">
<h1>Game Lobby</h1>
<p>Share this code:</p>
<div class="room-code" id="displayRoomCode">----</div>
<div class="players-list" id="playersList"></div>
<button id="readyBtn" onclick="toggleReady()">Ready</button>
<button id="startBtn" onclick="startGame()" style="display:none">Start Game</button>
</div>

<div id="gameScreen" class="screen">
<div class="game-header">
<div class="turn-info" id="turnInfo">Waiting...</div>
<div class="plays-left" id="playsLeft"></div>
<button onclick="showSettings()" style="padding:6px 12px">⚙️</button>
</div>
<div id="pendingBanner" class="pending-banner" style="display:none"></div>
<div class="opponents" id="opponents"></div>
<div class="game-center">
<div class="deck-display"><div>DECK</div><div class="deck-count" id="deckCount">0</div><div>cards</div></div>
<div class="last-played" id="lastPlayed"></div>
</div>
<div class="my-area"><h3>Your Hand</h3><div class="cards-row" id="myHand"></div></div>
<div class="my-area"><h3>Bank: $<span id="bankValue">0</span>M</h3><div class="cards-row" id="myBank"></div></div>
<div class="my-area"><h3>Properties</h3><div class="props-display" id="myProps"></div></div>
<div class="action-log" id="actionLog"></div>
<button id="showActionsBtn" onclick="showActionPanel()">📋</button>
<button id="endTurnBtn" onclick="endTurn()" style="display:none">END TURN</button>
</div>

<div id="actionPanel"><button onclick="hideActionPanel()" style="float:right;padding:4px 12px">✕</button><div id="actionContent"></div></div>
<div id="overlay"><div id="overlayContent" style="padding-top:80px;text-align:center"></div></div>

<script>
const COLORS={BROWN:'#8B4513',LIGHT_BLUE:'#87CEEB',PINK:'#FF69B4',ORANGE:'#FFA500',RED:'#FF0000',YELLOW:'#FFD700',GREEN:'#228B22',DARK_BLUE:'#00008B',RAILROAD:'#4B0082',UTILITY:'#808080'};
const SET_SIZES={BROWN:2,DARK_BLUE:2,UTILITY:2,RAILROAD:4,LIGHT_BLUE:3,PINK:3,ORANGE:3,RED:3,YELLOW:3,GREEN:3};
let ws,myId=null,roomCode=null,state=null,priv=null,selectedCard=null,paymentSel={bank:[],props:[]};

function connect(){
const protocol=location.protocol==='https:'?'wss:':'ws:';
ws=new WebSocket(protocol+'//'+location.host);
ws.onmessage=e=>{
const d=JSON.parse(e.data);
if(d.type==='created'||d.type==='joined'){myId=d.playerId;roomCode=d.code;document.getElementById('displayRoomCode').textContent=roomCode;showScreen('lobbyScreen')}
if(d.type==='error')alert(d.message);
if(d.type==='state'){state=d.public;priv=d.private;myId=d.playerId;roomCode=d.roomCode;
if(state.state==='lobby'){renderLobby();showScreen('lobbyScreen')}
else{renderGame();showScreen('gameScreen')}}
};
ws.onclose=()=>setTimeout(connect,2000);
}
function send(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d))}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function createGame(){send({type:'create',name:document.getElementById('playerName').value.trim()||'Player'})}
function joinGame(){const code=document.getElementById('roomCodeInput').value.trim().toUpperCase();if(!code){document.getElementById('homeError').textContent='Enter room code';return}send({type:'join',name:document.getElementById('playerName').value.trim()||'Player',code})}
function toggleReady(){send({type:'ready'})}
function startGame(){send({type:'start'})}
function endTurn(){send({type:'endTurn'});hideActionPanel()}
function playAgain(){send({type:'playAgain'});hideOverlay()}

function renderLobby(){
const list=document.getElementById('playersList');list.innerHTML='<h3>Players</h3>';
let isHost=false,allReady=true,count=0;
state.playerOrder.forEach(pid=>{const p=state.players[pid];
const div=document.createElement('div');div.className='player-item'+(p.ready?' ready':'')+(p.isHost?' host':'');div.textContent=p.name;list.appendChild(div);
if(pid===myId&&p.isHost)isHost=true;if(!p.ready)allReady=false;count++});
document.getElementById('startBtn').style.display=isHost?'inline-block':'none';
document.getElementById('startBtn').disabled=!allReady||count<2;
const meReady=state.players[myId]?.ready;
document.getElementById('readyBtn').textContent=meReady?'Not Ready':'Ready';
document.getElementById('readyBtn').className=meReady?'danger':''}

function renderGame(){
if(state.state==='gameover'){document.getElementById('overlay').style.display='block';document.getElementById('overlayContent').innerHTML='<div class="winner-banner"><h1>🎉 '+state.winner+' Wins!</h1><p style="margin:15px 0">Congratulations!</p><button onclick="playAgain()">Play Again</button></div>';return}
document.getElementById('overlay').style.display='none';
const isMyTurn=state.currentPlayer===myId;
document.getElementById('turnInfo').textContent=isMyTurn?"Your Turn!":state.currentPlayerName+"'s Turn";
document.getElementById('turnInfo').style.color=isMyTurn?'#4CAF50':'#fff';
document.getElementById('playsLeft').textContent=isMyTurn?(3-state.cardsPlayed)+' plays left':'';
document.getElementById('endTurnBtn').style.display=isMyTurn&&!state.pendingAction?'block':'none';

const banner=document.getElementById('pendingBanner');
if(state.pendingAction){
const t=state.pendingAction.type;
if(t==='RENT')banner.textContent='RENT - Pay $'+state.pendingAction.amount+'M';
else if(t==='BIRTHDAY')banner.textContent='BIRTHDAY - Pay $'+state.pendingAction.amount+'M';
else if(t==='DEBT')banner.textContent='DEBT - Pay $'+state.pendingAction.amount+'M';
else banner.textContent=t+' - Waiting...';
banner.style.display='block'}else banner.style.display='none';

const opp=document.getElementById('opponents');opp.innerHTML='';
state.playerOrder.forEach(pid=>{if(pid===myId)return;const p=state.players[pid];
const div=document.createElement('div');div.className='opponent'+(pid===state.currentPlayer?' current':'');
let badges='';for(const c in p.properties){badges+='<div class="prop-badge'+(p.properties[c].complete?' complete':'')+'" style="background:'+COLORS[c]+'">'+p.properties[c].count+'</div>'}
div.innerHTML='<h4>'+p.name+'</h4><div class="opponent-info">Hand:'+p.handCount+' Bank:$'+p.bankValue+'M Sets:'+p.completeSets+'/3</div><div class="opponent-props">'+badges+'</div>';
opp.appendChild(div)});

document.getElementById('deckCount').textContent=state.deckCount;
renderLastPlayed();renderMyHand();renderMyBank();renderMyProps();
const log=document.getElementById('actionLog');log.innerHTML=state.actionLog.slice(-8).map(l=>'<div>'+l+'</div>').join('');

if(priv.needsPayment)showPaymentUI();
else if(priv.needsStealResponse)showStealResponseUI();
else if(priv.pendingWildcards&&priv.pendingWildcards.length>0)showWildPlacementUI()}

function getCardImg(c){
if(c.type==='MONEY')return'/assets/Assets_'+c.value+'MILLION.PNG';
if(c.type==='PROPERTY'&&c.img)return'/assets/'+c.img+'.PNG';
if(c.type==='RENT'){const s=[...c.colors].sort().join(',');const m={'ALL':'/assets/rent_rentwild.PNG','DARK_BLUE,GREEN':'/assets/rent_rentdarkbluegreen.PNG','BROWN,LIGHT_BLUE':'/assets/rent_rentlightbluebrown.PNG','ORANGE,PINK':'/assets/rent_rentpinkorange.PNG','RAILROAD,UTILITY':'/assets/rent_rentutilityrailroad.PNG','RED,YELLOW':'/assets/rent_rentyellowred.PNG'};return m[s]||m['ALL']}
if(c.type==='WILDCARD'){const s=[...c.colors].sort().join(',');const m={'ALL':'/assets/wildcard_wild.PNG','DARK_BLUE,GREEN':'/assets/wildcard_wildgreendarkblue.PNG','GREEN,RAILROAD':'/assets/wildcard_wildgreenrailroad.PNG','BROWN,LIGHT_BLUE':'/assets/wildcard_wildlightbluebrown.PNG','LIGHT_BLUE,RAILROAD':'/assets/wildcard_wildlightbluerailroad.PNG','ORANGE,PINK':'/assets/wildcard_wildorangepink.PNG','RAILROAD,UTILITY':'/assets/wildcard_wildutilityrailroad.PNG','RED,YELLOW':'/assets/wildcard_wildyellowred.PNG'};return m[s]||m['ALL']}
if(c.type==='ACTION'){const m={PASS_GO:'passgo',BIRTHDAY:'birthday',DEBT_COLLECTOR:'debtcollector',SLY_DEAL:'slydeal',FORCED_DEAL:'forceddeal',DEAL_BREAKER:'dealbreaker',HOUSE:'house',HOTEL:'hotel',JUST_SAY_NO:'justsayno',DOUBLE_RENT:'double'};return'/assets/'+(m[c.actionType]||'passgo')+'.PNG'}
return''}

function renderLastPlayed(){
const div=document.getElementById('lastPlayed');if(!state.lastPlayedCard){div.innerHTML='';return}
div.innerHTML='<div style="font-size:11px;margin-bottom:4px">LAST PLAYED</div><div class="last-played-card" style="background-image:url(\''+getCardImg(state.lastPlayedCard)+'\')"></div><div style="font-size:11px;margin-top:4px">'+state.lastPlayedBy+' '+(state.lastPlayedType==='bank'?'banked':state.lastPlayedType==='discarded'?'discarded':'played')+'</div>'}

function renderMyHand(){
const div=document.getElementById('myHand');div.innerHTML='';if(!priv||!priv.hand)return;
priv.hand.forEach((c,i)=>{const d=document.createElement('div');d.className='card'+(selectedCard===i?' selected':'');d.style.backgroundImage="url('"+getCardImg(c)+"')";d.onclick=()=>selectCard(i);div.appendChild(d)})}

function renderMyBank(){
const div=document.getElementById('myBank');div.innerHTML='';if(!priv||!priv.bank)return;
let total=0;priv.bank.forEach(c=>{total+=c.value||0;const d=document.createElement('div');d.className='card';d.style.backgroundImage="url('/assets/Assets_"+c.value+"MILLION.PNG')";div.appendChild(d)});
document.getElementById('bankValue').textContent=total}

function renderMyProps(){
const div=document.getElementById('myProps');div.innerHTML='';if(!priv||!priv.properties)return;
for(const color in priv.properties){const prop=priv.properties[color];const setSize=SET_SIZES[color]||3;const complete=prop.cards.length>=setSize;
const setDiv=document.createElement('div');setDiv.className='prop-set'+(complete?' complete':'');
let extras='';if(prop.house)extras+='🏠';if(prop.hotel)extras+='🏨';
let cards='';prop.cards.forEach((c,i)=>{cards+='<div class="prop-card" style="background-image:url(\''+getCardImg(c)+'\')" onclick="clickPropCard(\''+color+'\','+(i+1)+','+(c.type==='WILDCARD')+','+(c.locked||false)+')"></div>'});
setDiv.innerHTML='<div class="prop-set-header" style="background:'+COLORS[color]+'">'+color.replace('_',' ')+' '+extras+'</div><div class="prop-cards">'+cards+'</div><div style="font-size:10px;margin-top:2px">'+prop.cards.length+'/'+setSize+'</div>';
div.appendChild(setDiv)}}

function selectCard(i){selectedCard=i;renderMyHand();showCardActions(i)}
function showActionPanel(){document.getElementById('actionPanel').classList.add('active');document.getElementById('showActionsBtn').style.display='none'}
function hideActionPanel(){document.getElementById('actionPanel').classList.remove('active');document.getElementById('showActionsBtn').style.display='block';selectedCard=null;renderMyHand()}

function showCardActions(i){
const c=priv.hand[i];if(!c)return;
const panel=document.getElementById('actionPanel');const content=document.getElementById('actionContent');
let html='<h3>Play: '+(c.name||c.type)+'</h3>';

if(c.type==='PROPERTY')html+='<button onclick="playCard('+i+',\'property\')">Play as Property</button>';
if(c.type==='WILDCARD'){html+='<div style="margin:10px 0">Choose color:</div><div class="color-select">';
const cols=c.colors[0]==='ALL'?Object.keys(COLORS):c.colors;
cols.forEach(col=>{html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="playCard('+i+',\'property\',{color:\''+col+'\'})">'+col.replace('_',' ')+'</div>'});html+='</div>'}
if(c.value>0)html+='<button onclick="playCard('+i+',\'bank\')">Bank $'+c.value+'M</button>';
if(c.type==='ACTION')html+=getActionUI(c,i);
if(c.type==='RENT')html+=getRentUI(c,i);
html+='<br><button class="danger" onclick="hideActionPanel()">Cancel</button>';
content.innerHTML=html;panel.classList.add('active');document.getElementById('showActionsBtn').style.display='none'}

function getActionUI(c,i){
let html='';
if(c.actionType==='PASS_GO')html='<button onclick="playCard('+i+',\'action\')">Draw 2 Cards</button>';
else if(c.actionType==='BIRTHDAY')html='<button onclick="playCard('+i+',\'action\')">Collect $2M from all</button>';
else if(c.actionType==='DEBT_COLLECTOR'){html='<div style="margin:10px 0">Collect $5M from:</div><div class="player-select">';state.playerOrder.forEach(pid=>{if(pid!==myId){const p=state.players[pid];html+='<div class="player-btn" onclick="playCard('+i+',\'action\',{targetId:\''+pid+'\'})">'+p.name+'</div>'}});html+='</div>'}
else if(c.actionType==='SLY_DEAL')html=getSlyDealUI(i);
else if(c.actionType==='FORCED_DEAL')html=getForcedDealUI(i);
else if(c.actionType==='DEAL_BREAKER')html=getDealBreakerUI(i);
else if(c.actionType==='HOUSE')html=getHouseUI(i);
else if(c.actionType==='HOTEL')html=getHotelUI(i);
else if(c.actionType==='JUST_SAY_NO')html='<p style="color:#8cf">Hold this card to block actions against you!</p>';
else if(c.actionType==='DOUBLE_RENT')html='<p style="color:#8cf">Select a Rent card to use Double Rent with it.</p>';
return html}

function getSlyDealUI(i){
let html='<div style="margin:10px 0">Steal property from:</div><div class="player-select">';
state.playerOrder.forEach(pid=>{if(pid!==myId){const p=state.players[pid];
for(const col in p.properties){if(!p.properties[col].complete){
html+='<div class="player-btn" style="background:'+COLORS[col]+'" onclick="playCard('+i+',\'action\',{targetId:\''+pid+'\',color:\''+col+'\'})">'+p.name+' - '+col.replace('_',' ')+'</div>'}}}});
return html+'</div>'}

function getForcedDealUI(i){
let html='<div style="margin:10px 0">Swap with (their incomplete set → your property):</div><div class="player-select">';
state.playerOrder.forEach(pid=>{if(pid!==myId){const p=state.players[pid];
for(const theirCol in p.properties){if(!p.properties[theirCol].complete){
for(const yourCol in priv.properties){
html+='<div class="player-btn" onclick="playCard('+i+',\'action\',{targetId:\''+pid+'\',theirColor:\''+theirCol+'\',yourColor:\''+yourCol+'\'})">'+p.name+': '+theirCol.replace('_',' ')+' ↔ '+yourCol.replace('_',' ')+'</div>'}}}}});
return html+'</div>'}

function getDealBreakerUI(i){
let html='<div style="margin:10px 0">Steal complete set from:</div><div class="player-select">';
state.playerOrder.forEach(pid=>{if(pid!==myId){const p=state.players[pid];
for(const col in p.properties){if(p.properties[col].complete){
html+='<div class="player-btn" style="background:'+COLORS[col]+'" onclick="playCard('+i+',\'action\',{targetId:\''+pid+'\',color:\''+col+'\'})">'+p.name+' - '+col.replace('_',' ')+'</div>'}}}});
if(html.indexOf('player-btn')===-1)html+='<p style="color:#f88">No complete sets to steal!</p>';
return html+'</div>'}

function getHouseUI(i){
let html='<div style="margin:10px 0">Add house to:</div><div class="color-select">';
for(const col in priv.properties){if(col!=='RAILROAD'&&col!=='UTILITY'){const p=priv.properties[col];const ss=SET_SIZES[col]||3;
if(p.cards.length>=ss&&!p.house){html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="playCard('+i+',\'action\',{color:\''+col+'\'})">'+col.replace('_',' ')+'</div>'}}}
if(html.indexOf('color-btn')===-1)html+='<p style="color:#f88">No eligible sets!</p>';
return html+'</div>'}

function getHotelUI(i){
let html='<div style="margin:10px 0">Add hotel to:</div><div class="color-select">';
for(const col in priv.properties){const p=priv.properties[col];const ss=SET_SIZES[col]||3;
if(p.cards.length>=ss&&p.house&&!p.hotel){html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="playCard('+i+',\'action\',{color:\''+col+'\'})">'+col.replace('_',' ')+'</div>'}}
if(html.indexOf('color-btn')===-1)html+='<p style="color:#f88">No sets with house!</p>';
return html+'</div>'}

function getRentUI(c,i){
let html='';const myProps=priv.properties||{};
const validCols=c.colors[0]==='ALL'?Object.keys(myProps):c.colors.filter(col=>myProps[col]&&myProps[col].cards.length>0);
if(validCols.length===0)return'<p style="color:#f88">No matching properties!</p>';
const hasDouble=priv.hand.some((card,idx)=>card.actionType==='DOUBLE_RENT'&&idx!==i);
const doubleIdx=priv.hand.findIndex((card,idx)=>card.actionType==='DOUBLE_RENT'&&idx!==i);
if(hasDouble)html+='<label style="color:#ff0;display:block;margin:10px 0"><input type="checkbox" id="useDouble"> Use Double Rent (2x, 2 plays)</label>';
if(c.colors[0]==='ALL'){html+='<div style="margin:10px 0">Color & target:</div><div id="rentTargets">';
validCols.forEach(col=>{state.playerOrder.forEach(pid=>{if(pid!==myId){const p=state.players[pid];
html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="playRent('+i+',\''+col+'\',\''+pid+'\','+(doubleIdx+1)+')">'+col.replace('_',' ')+' → '+p.name+'</div>'}})});
html+='</div>'}else{html+='<div style="margin:10px 0">Charge rent on:</div><div class="color-select">';
validCols.forEach(col=>{html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="playRent('+i+',\''+col+'\',null,'+(doubleIdx+1)+')">'+col.replace('_',' ')+'</div>'});
html+='</div>'}
return html}

function playRent(i,color,targetId,doubleIdx){
const useDouble=document.getElementById('useDouble')?.checked;
const data={color};if(targetId)data.targetId=targetId;
if(useDouble&&doubleIdx>0)data.doubleRentIndex=doubleIdx;
playCard(i,'action',data)}

function playCard(i,type,data){send({type:'playCard',cardIndex:i+1,playType:type,targetData:data||{}});hideActionPanel()}

function showPaymentUI(){
paymentSel={bank:[],props:[]};renderPaymentUI()}
function renderPaymentUI(){
const content=document.getElementById('actionContent');const owed=priv.paymentAmount;
let selTotal=0;paymentSel.bank.forEach(i=>{selTotal+=(priv.bank[i]?.value||0)});
paymentSel.props.forEach(p=>{selTotal+=p.value||0});
let html='<h3>You owe $'+owed+'M</h3><div>Selected: $'+selTotal+'M</div>';
html+='<div style="margin:10px 0"><b>Bank:</b></div><div class="payment-cards">';
priv.bank.forEach((c,i)=>{const sel=paymentSel.bank.includes(i);html+='<div class="pay-card'+(sel?' selected':'')+'" onclick="togglePayBank('+i+')">$'+c.value+'M</div>'});
html+='</div><div style="margin:10px 0"><b>Properties:</b></div><div class="payment-cards">';
for(const col in priv.properties){priv.properties[col].cards.forEach((c,idx)=>{const key=col+'-'+idx;const sel=paymentSel.props.some(p=>p.key===key);
html+='<div class="pay-card'+(sel?' selected':'')+'" style="background:'+COLORS[col]+'" onclick="togglePayProp(\''+key+'\',\''+col+'\','+idx+','+(c.value||2)+')">$'+(c.value||2)+'M</div>'})}
html+='</div>';
const hasJSN=priv.hand?.some(c=>c.actionType==='JUST_SAY_NO');
if(hasJSN)html+='<button style="background:#9b59b6" onclick="useJustSayNo()">Just Say No!</button>';
let canPay=selTotal>=owed;let totalAssets=priv.bank.reduce((s,c)=>s+(c.value||0),0);
for(const col in priv.properties){priv.properties[col].cards.forEach(c=>{totalAssets+=(c.value||2)})}
if(totalAssets<owed)canPay=selTotal>0;
html+='<button onclick="submitPayment()"'+(canPay?'':' disabled')+'>Pay $'+selTotal+'M</button>';
content.innerHTML=html;showActionPanel()}

function togglePayBank(i){const idx=paymentSel.bank.indexOf(i);if(idx>=0)paymentSel.bank.splice(idx,1);else paymentSel.bank.push(i);renderPaymentUI()}
function togglePayProp(key,col,idx,val){const i=paymentSel.props.findIndex(p=>p.key===key);if(i>=0)paymentSel.props.splice(i,1);else paymentSel.props.push({key,color:col,index:idx+1,value:val});renderPaymentUI()}
function submitPayment(){send({type:'pay',payment:{bankIndices:paymentSel.bank.map(i=>i+1),propertyData:paymentSel.props.map(p=>({color:p.color,index:p.index}))}});hideActionPanel()}
function useJustSayNo(){const idx=priv.hand.findIndex(c=>c.actionType==='JUST_SAY_NO');if(idx>=0)send({type:'respond',response:'JUST_SAY_NO',cardIndex:idx+1});hideActionPanel()}

function showStealResponseUI(){
const content=document.getElementById('actionContent');const t=priv.stealActionType;
let html='<h3>'+t.replace('_',' ')+'</h3><p>Someone is trying to steal from you!</p>';
const hasJSN=priv.hand?.some(c=>c.actionType==='JUST_SAY_NO');
if(hasJSN)html+='<button style="background:#9b59b6" onclick="useJustSayNo()">Just Say No!</button>';
html+='<button class="danger" onclick="acceptSteal()">Accept</button>';
content.innerHTML=html;showActionPanel()}
function acceptSteal(){send({type:'respond',response:'ACCEPT'});hideActionPanel()}

function showWildPlacementUI(){
const content=document.getElementById('actionContent');const wc=priv.pendingWildcards[0];
let html='<h3>Place Wildcard</h3><p>Choose color for received wildcard:</p><div class="color-select">';
const cols=wc.colors[0]==='ALL'?Object.keys(COLORS):wc.colors;
cols.forEach(col=>{html+='<div class="color-btn" style="background:'+COLORS[col]+'" onclick="placeWild(0,\''+col+'\')">'+col.replace('_',' ')+'</div>'});
content.innerHTML=html+'</div>';showActionPanel()}
function placeWild(idx,col){send({type:'placeWild',index:idx,color:col});hideActionPanel()}

function clickPropCard(col,idx,isWild,locked){
if(!isWild||locked||state.currentPlayer!==myId)return;
const content=document.getElementById('actionContent');
const card=priv.properties[col]?.cards[idx-1];if(!card)return;
let html='<h3>Move Wildcard</h3><p>Move to which color?</p><div class="color-select">';
const cols=card.colors[0]==='ALL'?Object.keys(COLORS):card.colors;
cols.forEach(c=>{if(c!==col)html+='<div class="color-btn" style="background:'+COLORS[c]+'" onclick="moveWild(\''+col+'\','+idx+',\''+c+'\')">'+c.replace('_',' ')+'</div>'});
content.innerHTML=html+'</div><button class="danger" onclick="hideActionPanel()">Cancel</button>';showActionPanel()}
function moveWild(from,idx,to){send({type:'moveWild',fromColor:from,cardIndex:idx,toColor:to});hideActionPanel()}

function showSettings(){document.getElementById('overlay').style.display='block';document.getElementById('overlayContent').innerHTML='<h2>Settings</h2><button class="danger" onclick="if(confirm(\'End game?\'))send({type:\'endGame\'})">End Game</button><br><br><button onclick="hideOverlay()">Back</button>'}
function hideOverlay(){document.getElementById('overlay').style.display='none'}
connect();
</script>
</body>
</html>
